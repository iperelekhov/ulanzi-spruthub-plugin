<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover" />
  <title>Spruthub Air Conditioner</title>
  <link rel="stylesheet" href="../../libs/css/uspi.css">
  <style>
    .uspi-item-label { width: 140px; }
  </style>
</head>

<body>
  <div class="udpi-wrapper hidden uspi-wrapper">

    <form id="property-inspector">

      <div class="uspi-heading" data-localize>Spruthub Connection</div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>WebSocket URL</div>
        <input class="uspi-item-value" type="text" id="wsUrl" name="wsUrl" placeholder="wss://192.168.0.100:443" required>
      </div>
      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Email</div>
        <input class="uspi-item-value" type="text" id="email" name="email" required>
      </div>
      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Password</div>
        <input class="uspi-item-value" type="password" id="password" name="password" required>
      </div>
      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Serial</div>
        <input class="uspi-item-value" type="text" id="serial" name="serial" required>
      </div>

      <details>
        <summary data-localize>Credentials are shared by all Spruthub keys.</summary>
      </details>

      <div class="uspi-heading" data-localize>Key Role</div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Role</div>
        <select class="uspi-item-value select" id="role" name="role">
          <option value="display" selected data-localize="Display (large tile)">Display (large tile)</option>
          <option value="mode" data-localize="Mode (heat/cool/auto)">Mode (heat/cool/auto)</option>
          <option value="fan" data-localize="Fan speed">Fan speed</option>
          <option value="swing" data-localize="Swing">Swing</option>
          <option value="temp_up" data-localize="Temp +">Temp +</option>
          <option value="temp_down" data-localize="Temp -">Temp -</option>
          <option value="power" data-localize="Power on/off">Power on/off</option>
        </select>
      </div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Display shows</div>
        <select class="uspi-item-value select" id="displayPair" name="displayPair">
          <option value="temps" selected data-localize="Current + Target temp">Current + Target temp</option>
          <option value="mode_fan" data-localize="Mode + Fan">Mode + Fan</option>
          <option value="target_mode" data-localize="Target + Mode">Target + Mode</option>
          <option value="swing_fan" data-localize="Swing + Fan">Swing + Fan</option>
        </select>
      </div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Press cycles (Display)</div>
        <select class="uspi-item-value select" id="cycle" name="cycle">
          <option value="mode" selected data-localize="Mode">Mode</option>
          <option value="fan" data-localize="Fan speed">Fan speed</option>
          <option value="swing" data-localize="Swing">Swing</option>
        </select>
      </div>

      <div class="uspi-heading" data-localize>Air Conditioner</div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Accessory ID (aId)</div>
        <input class="uspi-item-value" type="text" id="aId" name="aId" pattern="\d+" required>
      </div>
      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Service ID (sId)</div>
        <input class="uspi-item-value" type="text" id="sSId" name="sSId" pattern="\d+" required>
      </div>

      <details>
        <summary data-localize>Characteristic IDs</summary>

        <div class="uspi-item">
          <div class="uspi-item-label" data-localize>Current temp cId</div>
          <input class="uspi-item-value" type="text" id="curCId" name="curCId" pattern="\d*">
        </div>
        <div class="uspi-item">
          <div class="uspi-item-label" data-localize>Current temp sId</div>
          <input class="uspi-item-value" type="text" id="curSId" name="curSId" pattern="\d*"
            placeholder="(defaults to Service ID)">
        </div>
        <div class="uspi-item">
          <div class="uspi-item-label" data-localize>Target temp cId</div>
          <input class="uspi-item-value" type="text" id="tgtCId" name="tgtCId" pattern="\d*">
        </div>
        <div class="uspi-item">
          <div class="uspi-item-label" data-localize>Mode cId</div>
          <input class="uspi-item-value" type="text" id="modeCId" name="modeCId" pattern="\d*">
        </div>
        <div class="uspi-item">
          <div class="uspi-item-label" data-localize>Fan cId</div>
          <input class="uspi-item-value" type="text" id="fanCId" name="fanCId" pattern="\d*">
        </div>
        <div class="uspi-item">
          <div class="uspi-item-label" data-localize>Swing cId</div>
          <input class="uspi-item-value" type="text" id="swingCId" name="swingCId" pattern="\d*">
        </div>
      </details>

    </form>

  </div>

  <script src="../../libs/js/constants.js"></script>
  <script src="../../libs/js/eventEmitter.js"></script>
  <script src="../../libs/js/timers.js"></script>
  <script src="../../libs/js/utils.js"></script>
  <script src="../../libs/js/ulanziApi.js"></script>

  <script src="./inspector.js"></script>

</body>

</html>
